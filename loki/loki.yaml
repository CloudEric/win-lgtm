auth_enabled: false

# Security configuration - Uncommend the lines below and specify the certificate to enable encryption
#
#http_tls_config:
#  cert_file: /path/to/server.crt
#  key_file: /path/to/server.key

server:
  http_listen_port: 3100

# Common configuration shared across components
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema configuration defines how data is stored
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true